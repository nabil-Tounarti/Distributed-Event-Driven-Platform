global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9092"]

  - job_name: "schema-registry"
    static_configs:
      - targets: ["schema-registry:8081"]

  - job_name: "debezium"
    static_configs:
      - targets: ["debezium:8083"]
